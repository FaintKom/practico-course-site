<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Practico.ai — AI для бизнеса</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root { --blue: #0080ff; --dark: #1e1e1e; --gray: #64748B; --bg: #F8FAFC; }
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Nunito', sans-serif; color: var(--dark); background: var(--bg); padding: 48px 24px; }
.container { max-width: 800px; margin: 0 auto; }
h1 { font-size: 2rem; margin-bottom: 8px; }
.subtitle { color: var(--gray); margin-bottom: 48px; }
.lesson-list { display: flex; flex-direction: column; gap: 12px; }
.lesson-link { display: block; padding: 20px 24px; background: white; border-radius: 12px; text-decoration: none; color: var(--dark); border: 1px solid #E2E8F0; transition: all 0.15s; }
.lesson-link:hover { border-color: var(--blue); box-shadow: 0 4px 12px rgba(0,128,255,0.1); }
.lesson-num { color: var(--blue); font-weight: 800; margin-right: 12px; }
.lesson-title { font-weight: 700; }
.soon { color: var(--gray); font-style: italic; }
</style>
</head>
<body>
<div class="container">
    <h1>Practico.ai</h1>
    <p class="subtitle">AI для бизнеса — Материалы курса</p>
    <div class="lesson-list">
        <a class="lesson-link" href="./lesson-01/">
            <span class="lesson-num">01</span>
            <span class="lesson-title">Знакомство и введение в AI</span>
        </a>
        <!-- Future lessons will be added here -->
    </div>
</div>
</body>
</html>
